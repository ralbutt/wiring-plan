<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rapid Assembly – Production Dashboard W21</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000; --bg2:#080f1c; --card:#0d1a2e; --card2:#112040;
  --border:#162840; --border2:#1c3358;
  --blue:#5de08a; --amber:#FF9800; --green:#4CAF50; --red:#f44336;
  --grey:#4a6075; --text:#cfe0f5; --text2:#5a7a9a; --accent:#5de08a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Barlow',sans-serif;color:var(--text)}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:200;
  background:#000;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
#logo{height:32px;width:auto}
.hdiv{width:1px;height:34px;background:var(--border2);flex-shrink:0}
#hdr-info{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
#hdr-date{font-size:12.5px;font-weight:600;color:var(--text2);letter-spacing:.3px}
#hdr-week{font-size:9.5px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase}
#view-title{
  flex:1;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;color:var(--blue);
}
#nav-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-btn{
  width:30px;height:30px;border-radius:5px;border:1px solid var(--border2);
  background:var(--card);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .18s;user-select:none;
}
.nav-btn:hover{background:var(--card2);border-color:var(--blue);color:var(--blue)}
.nav-btn:active{transform:scale(.93)}
#dots{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .22s}
.dot.active{background:var(--blue);box-shadow:0 0 8px rgba(93,224,138,.75)}
.dot:hover:not(.active){background:var(--text2)}
#clock{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:2px;min-width:94px;text-align:right;flex-shrink:0}

/* PROGRESS */
#pbar-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(22,40,64,.6);z-index:200}
#pbar{height:100%;background:var(--blue);width:0%;transition:width .08s linear;box-shadow:0 0 6px var(--blue)}

/* VIEWS */
.view{position:fixed;top:60px;left:0;right:0;bottom:3px;overflow:hidden;opacity:0;transition:opacity .45s ease;pointer-events:none}
.view.active{opacity:1;pointer-events:all}
.scroll{height:100%;overflow-y:auto;padding:14px 18px}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;white-space:nowrap}
.b-plan{background:rgba(93,224,138,.10);color:var(--blue);border:1px solid rgba(93,224,138,.28)}
.b-prog{background:rgba(255,152,0,.12);color:var(--amber);border:1px solid rgba(255,152,0,.3)}

/* VIEW 1 CARDS */
.sec-head{
  font-family:'Barlow Condensed',sans-serif;font-size:10.5px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text2);
  margin:12px 0 7px;padding-left:9px;border-left:3px solid var(--blue);
}
.sec-head.amber{border-color:var(--amber)}
.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:8px;margin-bottom:8px}
.jcard{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;border-left:3px solid var(--border);
  transition:border-color .2s;
}
.jcard.plan{border-left-color:var(--blue)}
.jcard.prog{border-left-color:var(--amber)}
.jcard:hover{border-color:var(--border2)}
.jtop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.jpn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.3px}
.jdesc{font-size:12px;color:var(--text);margin-bottom:5px;line-height:1.3}
.jmeta{display:flex;gap:8px;flex-wrap:wrap}
.jmi{font-size:10.5px;color:var(--text2)}
.jmi strong{color:var(--text)}
.jop{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:#fff}
.hrs-rem{
  margin-top:6px;padding:4px 8px;background:rgba(0,200,232,.06);
  border:1px solid rgba(0,200,232,.15);border-radius:4px;
  font-size:10.5px;color:var(--accent);
  display:flex;align-items:center;gap:6px;
}
.hrs-rem strong{color:#fff}

/* CAP ROW */
.cap-row{margin-top:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px;display:flex;gap:24px;align-items:center}
.cap-stat{display:flex;flex-direction:column;gap:2px}
.cap-label{font-size:9.5px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.cap-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700}
.cap-bar-wrap{flex:1}
.cap-bar-track{height:5px;background:var(--border);border-radius:3px;margin-top:5px}
.cap-bar-fill{height:100%;border-radius:3px}
.cap-pct{font-size:10.5px;margin-top:3px}

/* VIEW 2 */
.op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.op-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:12px}
.op-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--border2);letter-spacing:.3px}
.op-job{margin-bottom:6px;padding:7px 9px;background:var(--bg2);border-radius:4px;border-left:2px solid var(--border)}
.op-job.plan{border-left-color:var(--blue)}
.op-job.prog{border-left-color:var(--amber)}
.ojpn{font-family:'Barlow Condensed',sans-serif;font-size:12.5px;font-weight:700;color:var(--accent)}
.ojdesc{font-size:10px;color:var(--text2);margin:2px 0;line-height:1.3}
.ojft{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:4px;flex-wrap:wrap}
.ojhrs{font-size:10px;color:var(--text2)}
.ojrem{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--accent)}

/* GANTT */
.gantt-wrap{height:100%;display:flex;flex-direction:column;padding:0 18px 8px}
.g-hdr{
  display:flex;flex-shrink:0;background:#000;
  border-bottom:2px solid var(--border2);
}
.g-lc{width:210px;flex-shrink:0;padding:5px 10px;display:flex;flex-direction:column;justify-content:flex-end}
.g-lc span{font-size:8.5px;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
.g-days-wrap{flex:1;display:flex;flex-direction:column}
.g-day-row{display:flex;flex:1}
.g-day{
  flex:1;text-align:center;padding:2px 0;
  border-left:1px solid var(--border);
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
}
.g-day.today{background:rgba(93,224,138,.07);color:var(--blue)}
.g-day:not(.today){color:var(--text2)}
.g-hr-row{display:flex;flex:1}
.g-hg{flex:1;display:flex;border-left:1px solid var(--border)}
.g-h{flex:1;border-left:1px solid rgba(22,40,64,.6);font-size:8px;color:rgba(90,122,154,.35);text-align:center;padding:1px 0}

.g-body{flex:1;overflow-y:auto}
.g-body::-webkit-scrollbar{width:3px}
.g-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.g-sec{display:flex;min-height:24px;background:rgba(93,224,138,.05);border-bottom:1px solid var(--border)}
.g-sec-lbl{
  width:210px;flex-shrink:0;padding:4px 10px;
  font-family:'Barlow Condensed',sans-serif;font-size:12.5px;font-weight:700;
  color:var(--blue);border-right:1px solid var(--border);display:flex;align-items:center;
}
.g-sec-r{flex:1}

.g-row{display:flex;align-items:stretch;min-height:36px;border-bottom:1px solid rgba(22,40,64,.4)}
.g-row:hover{background:rgba(255,255,255,.012)}
.g-rl{
  width:210px;flex-shrink:0;padding:5px 10px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
  border-right:1px solid var(--border);background:var(--card);
}
.g-rl .gpn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--accent)}
.g-rl .gdesc{font-size:9px;color:var(--text2);line-height:1.2}
.g-rl .grem{font-size:9px;color:var(--accent);font-weight:600}

.g-tl{flex:1;position:relative;display:flex}
.g-cell{flex:1;border-left:1px solid rgba(22,40,64,.4);position:relative}
.g-cell.tc{background:rgba(93,224,138,.04)}
.g-cell.tc::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(93,224,138,.38);transform:translateX(-50%)}
.g-cell.fri-col{background:rgba(255,255,255,.012)}

.g-bar{
  position:absolute;top:5px;bottom:5px;border-radius:3px;
  display:flex;align-items:center;padding:0 5px;
  font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;
  font-family:'Barlow Condensed',sans-serif;
}
.g-bar.plan{background:rgba(93,224,138,.22);border:1px solid rgba(93,224,138,.45);color:rgba(205,230,255,.9)}
.g-bar.prog{background:rgba(255,152,0,.28);border:1px solid rgba(255,152,0,.5);color:rgba(255,230,200,.9)}

/* today line in gantt */
.today-line{
  position:absolute;top:0;bottom:0;width:2px;
  background:rgba(93,224,138,.45);z-index:5;pointer-events:none;
}
</style>
</head>

      <div class="cap-pct" style="color:var(--green)">98.5% &nbsp;·&nbsp; 7 h remaining this week</div>
    </div>
  </div>
</div>
</div>

<!-- VIEW 2: OPERATOR PLANS -->
<div class="view" id="v1">
<div class="scroll"><div class="op-grid" id="op-grid"></div></div>
</div>

<!-- VIEW 3: GANTT BY DATE -->
<div class="view" id="v2">
<div class="gantt-wrap">
  <div class="g-hdr" id="g3-hdr"></div>
  <div class="g-body" id="g3-body"></div>
</div>
</div>

<!-- VIEW 4: GANTT BY OPERATOR -->
<div class="view" id="v3">
<div class="gantt-wrap">
  <div class="g-hdr" id="g4-hdr"></div>
  <div class="g-body" id="g4-body"></div>
</div>
</div>

<div id="pbar-wrap"><div id="pbar"></div></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DATA — from Wiring_Production_Plan.xlsx (updated sheet)
//  Today = Thu 21 May 2026.
//  Gantt shows Thu + Fri only (from today onwards).
//  No To Plan. No Completed. No operators with zero jobs shown.
//  hrsRemaining = reqHrs minus hours worked Mon/Tue/Wed.
// ═══════════════════════════════════════════════════════════════

// Days shown in Gantt: Thu=0, Fri=1  (2 days only)
const GDAYS=[
  {label:'Thu 21/05', today:true,  sourceDay:3},
  {label:'Fri 22/05', today:false, sourceDay:4},
];
const TOTAL_CELLS = GDAYS.length * 8; // 16

// ── Job definitions ──────────────────────────────────────────
// schedule uses GANTT DAY INDEX (0=Thu, 1=Fri), h1/h2 inclusive 1-8
// hrsRemaining = reqHrs - hours already worked before today
const JOBS=[
  {
    pn:'P37001', desc:'Harness, Cage Console', customer:'Niftylift',
    operator:'Damien Rowlinson', status:'inprogress',
    qty:5, reqHrs:25, hrsRemaining:25,
    schedule:[{day:0,h1:1,h2:8},{day:1,h1:1,h2:8}], overflow:true
  },
  {
    pn:'P39235', desc:'Cage Console Hydraulic Lever', customer:'Niftylift',
    operator:'Skot Barratt', status:'inprogress',
    qty:6, reqHrs:6, hrsRemaining:4,
    schedule:[{day:0,h1:1,h2:4}], overflow:false
  },
  {
    pn:'P37293', desc:'Console Assembled HR15/17NE MK4', customer:'Niftylift',
    operator:'Skot Barratt', status:'planned',
    qty:3, reqHrs:9, hrsRemaining:9,
    schedule:[{day:0,h1:5,h2:8},{day:1,h1:1,h2:5}], overflow:false
  },
  {
    pn:'P35181', desc:'Loom Cage Console', customer:'Niftylift',
    operator:'Shamsher Ali', status:'inprogress',
    qty:3, reqHrs:21, hrsRemaining:21,
    schedule:[{day:0,h1:1,h2:8},{day:1,h1:1,h2:8}], overflow:true
  },
  {
    pn:'P31030', desc:'Loom, Cage Console', customer:'Niftylift',
    operator:'Mayer Patel', status:'inprogress',
    qty:7, reqHrs:49, hrsRemaining:41,
    schedule:[{day:0,h1:1,h2:8},{day:1,h1:1,h2:8}], overflow:true
  },
  {
    pn:'P32480', desc:'Generic Cage Console Assembled', customer:'Niftylift',
    operator:'Bradley Evans', status:'planned',
    qty:2, reqHrs:2, hrsRemaining:2,
    schedule:[{day:0,h1:1,h2:2}], overflow:false
  },
  {
    pn:'P38932', desc:'Cage Console Wired HR28 MK2 Hybrid', customer:'Niftylift',
    operator:'Bradley Evans', status:'planned',
    qty:2, reqHrs:32, hrsRemaining:32,
    schedule:[{day:0,h1:3,h2:8},{day:1,h1:1,h2:8}], overflow:true
  },
];

// Operators who have jobs today
const ACTIVE_OPS=[...new Set(JOBS.map(j=>j.operator))].sort();

// ── helpers ──────────────────────────────────────────────────
const sc = j => j.status==='inprogress'?'prog':'plan';
const badge = j => j.status==='inprogress'
  ? '<span class="badge b-prog">In Progress</span>'
  : '<span class="badge b-plan">Planned</span>';
const todayHrs = j => j.schedule.filter(s=>s.day===0).reduce((a,s)=>a+(s.h2-s.h1+1),0);

// ═══════════════════════════════════════════════════════════════
//  VIEW 1 – TEAM PLAN FOR TODAY
// ═══════════════════════════════════════════════════════════════
const prog = JOBS.filter(j=>j.status==='inprogress');
const plan = JOBS.filter(j=>j.status!=='inprogress');

function jobCard(j){
  const th = todayHrs(j);
  const remLabel = j.hrsRemaining > 0
    ? `<div class="hrs-rem">&#9201; <strong>${j.hrsRemaining}h</strong> remaining on this job${j.overflow?' (continues next week)':''}</div>`
    : '';
  return `<div class="jcard ${sc(j)}">
    <div class="jtop"><span class="jpn">${j.pn}</span>${badge(j)}</div>
    <div class="jdesc">${j.desc}</div>
    <div class="jmeta">
      <div class="jmi"><strong>Operator:</strong> <span class="jop">${j.operator}</span></div>
      <div class="jmi"><strong>Customer:</strong> ${j.customer}</div>
      <div class="jmi"><strong>Qty:</strong> ${j.qty}</div>
      <div class="jmi"><strong>Total Hrs:</strong> ${j.reqHrs}h</div>
      ${th?`<div class="jmi"><strong>Today:</strong> ${th}h scheduled</div>`:''}
    </div>
    ${remLabel}
  </div>`;
}
document.getElementById('jg-prog').innerHTML = prog.map(jobCard).join('');
document.getElementById('jg-plan').innerHTML = plan.map(jobCard).join('');

// ═══════════════════════════════════════════════════════════════
//  VIEW 2 – OPERATOR PLANS  (only active operators shown)
// ═══════════════════════════════════════════════════════════════
const opGrid = document.getElementById('op-grid');
ACTIVE_OPS.forEach(emp=>{
  const empJobs = JOBS.filter(j=>j.operator===emp);
  if(empJobs.length===0) return;
  const card = document.createElement('div');
  card.className='op-card';
  let inner = `<div class="op-name">${emp}</div>`;
  empJobs.forEach(j=>{
    const th = todayHrs(j);
    inner += `<div class="op-job ${sc(j)}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:2px">
        <span class="ojpn">${j.pn}</span>${badge(j)}
      </div>
      <div class="ojdesc">${j.desc}</div>
      <div class="ojft">
        <span class="ojhrs">${th?th+'h today &nbsp;·&nbsp; ':''} Total: ${j.reqHrs}h</span>
        <span class="ojrem">&#9201; ${j.hrsRemaining}h remaining${j.overflow?' &#8594;':''}</span>
      </div>
    </div>`;
  });
  card.innerHTML = inner;
  opGrid.appendChild(card);
});

// ═══════════════════════════════════════════════════════════════
//  GANTT BUILDER  (Thu + Fri only)
// ═══════════════════════════════════════════════════════════════
function buildHeader(hdrId){
  const hdr = document.getElementById(hdrId);
  const lc = document.createElement('div'); lc.className='g-lc';
  lc.innerHTML='<span>Job / Operator</span>'; hdr.appendChild(lc);
  const dw = document.createElement('div'); dw.className='g-days-wrap';
  const dr = document.createElement('div'); dr.className='g-day-row';
  const hr = document.createElement('div'); hr.className='g-hr-row';
  GDAYS.forEach(d=>{
    const dd=document.createElement('div');
    dd.className='g-day'+(d.today?' today':'');
    dd.textContent=d.label; dr.appendChild(dd);
    const hg=document.createElement('div'); hg.className='g-hg';
    for(let h=1;h<=8;h++){const hd=document.createElement('div');hd.className='g-h';hd.textContent='H'+h;hg.appendChild(hd);}
    hr.appendChild(hg);
  });
  dw.appendChild(dr); dw.appendChild(hr); hdr.appendChild(dw);
}

function addRow(bodyEl, job){
  const row = document.createElement('div'); row.className='g-row';
  const rl = document.createElement('div'); rl.className='g-rl';
  rl.innerHTML=`<span class="gpn">${job.pn}</span>
    <span class="gdesc">${job.desc.length>35?job.desc.slice(0,33)+'…':job.desc}</span>
    <span class="grem">&#9201; ${job.hrsRemaining}h remaining</span>`;
  row.appendChild(rl);

  const tl = document.createElement('div'); tl.className='g-tl';
  GDAYS.forEach((d,di)=>{
    for(let h=1;h<=8;h++){
      const cell=document.createElement('div');
      let cls='g-cell';
      if(d.today) cls+=' tc';
      else cls+=' fri-col';
      cell.className=cls;
      tl.appendChild(cell);
    }
  });

  // bars — schedule already uses gantt-day index (0=Thu,1=Fri)
  job.schedule.forEach(seg=>{
    const start=seg.day*8+(seg.h1-1);
    const end=seg.day*8+(seg.h2-1);
    if(start>=TOTAL_CELLS) return;
    const bar=document.createElement('div');
    bar.className=`g-bar ${sc(job)}`;
    bar.style.left=(start/TOTAL_CELLS*100)+'%';
    bar.style.width=((Math.min(end,TOTAL_CELLS-1)-start+1)/TOTAL_CELLS*100)+'%';
    bar.textContent = job.pn + (job.overflow&&seg.day===1&&seg.h2===8?' →':'');
    tl.appendChild(bar);
  });
  row.appendChild(tl);
  bodyEl.appendChild(row);
}

function addSecHead(bodyEl, name){
  const sec=document.createElement('div'); sec.className='g-sec';
  const sl=document.createElement('div'); sl.className='g-sec-lbl'; sl.textContent=name;
  const sr=document.createElement('div'); sr.className='g-sec-r';
  sec.appendChild(sl); sec.appendChild(sr);
  bodyEl.appendChild(sec);
}

// View 3 – by start hour on Thu then Fri
buildHeader('g3-hdr');
const g3 = document.getElementById('g3-body');
const sorted3=[...JOBS].sort((a,b)=>{
  const as=a.schedule[0], bs=b.schedule[0];
  if(as.day!==bs.day) return as.day-bs.day;
  return as.h1-bs.h1;
});
sorted3.forEach(j=>addRow(g3,j));

// View 4 – by operator (sorted), then date within
buildHeader('g4-hdr');
const g4 = document.getElementById('g4-body');
ACTIVE_OPS.forEach(emp=>{
  const ejs=JOBS.filter(j=>j.operator===emp);
  if(!ejs.length) return;
  addSecHead(g4,emp);
  [...ejs].sort((a,b)=>a.schedule[0].day-b.schedule[0].day||a.schedule[0].h1-b.schedule[0].h1)
    .forEach(j=>addRow(g4,j));
});

// ═══════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}
tick(); setInterval(tick,1000);

// ═══════════════════════════════════════════════════════════════
//  VIEW CYCLING  — 15s auto + manual nav
// ═══════════════════════════════════════════════════════════════
const VIEWS=['v0','v1','v2','v3'];
const LABELS=['Team Plan for the Day','Individual Operator Plans','Gantt – Date Order (Thu–Fri)','Gantt – By Operator'];
let cur=0, startMs=Date.now(), paused=false;
const DUR=15000;

function goTo(idx){
  document.getElementById(VIEWS[cur]).classList.remove('active');
  document.querySelector(`.dot[data-v="${cur}"]`).classList.remove('active');
  cur=((idx%4)+4)%4;
  document.getElementById(VIEWS[cur]).classList.add('active');
  document.querySelector(`.dot[data-v="${cur}"]`).classList.add('active');
  document.getElementById('view-title').textContent=LABELS[cur];
  startMs=Date.now();
}

document.getElementById('btn-prev').addEventListener('click',()=>goTo(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>goTo(cur+1));
document.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>goTo(+d.dataset.v)));

VIEWS.forEach(vid=>{
  const el=document.getElementById(vid);
  el.addEventListener('mouseenter',()=>paused=true);
  el.addEventListener('mouseleave',()=>{paused=false;startMs=Date.now();});
});

(function frame(){
  if(!paused){
    const pct=Math.min((Date.now()-startMs)/DUR,1);
    document.getElementById('pbar').style.width=(pct*100)+'%';
    if(pct>=1) goTo(cur+1);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
